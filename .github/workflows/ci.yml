name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: 后端测试
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: 安装 JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      # CI 直连 Maven Central（项目本地用 aliyun 镜像，CI 境外直连更稳）；后端为纯单元测试，无需 MySQL
      - run: chmod +x mvnw
      - name: mvn test
        run: ./mvnw -B test

  frontend:
    name: 前端构建与测试
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: 安装 Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: 类型检查 + 构建
        run: npm run build
      - name: 单元测试
        run: npm run test:unit