<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>华彩经营管理平台 - 登录</title>
  <style>
    :root{
      --bg:#eef4ff;
      --panel:#f8fbff;
      --card:#ffffff;
      --line:#d8e6ff;
      --line-2:#c9dcff;
      --text:#102a5c;
      --muted:#6f84ab;
      --primary:#3d7cff;
      --primary-2:#2f64f3;
      --shadow:0 20px 60px rgba(58,108,214,.12);
      --shadow-soft:0 10px 30px rgba(78,120,199,.10);
      --radius-xl:30px;
      --radius-lg:22px;
      --radius-md:16px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:"PingFang SC","Microsoft YaHei","Helvetica Neue",Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 15% 15%, rgba(132,176,255,.14), transparent 22%),
        radial-gradient(circle at 85% 80%, rgba(90,148,255,.16), transparent 24%),
        linear-gradient(180deg,#edf4ff 0%,#f6f9ff 100%);
      min-height:100vh;
    }
    .page{
      width:min(1680px, calc(100vw - 48px));
      margin:24px auto;
      display:grid;
      grid-template-columns: 1.25fr .95fr;
      gap:24px;
      min-height:calc(100vh - 48px);
    }
    .hero,.login{
      border-radius:var(--radius-xl);
      border:1px solid var(--line);
      background:rgba(255,255,255,.72);
      backdrop-filter:blur(10px);
      box-shadow:var(--shadow);
      position:relative;
      overflow:hidden;
    }
    .hero{
      padding:54px 56px;
      background:
        linear-gradient(140deg, rgba(255,255,255,.85), rgba(231,241,255,.94)),
        linear-gradient(180deg,#edf5ff 0%, #dfeeff 100%);
    }
    .hero::before{
      content:"";
      position:absolute;
      inset:auto -8% -8% auto;
      width:62%;
      height:68%;
      background:
        radial-gradient(circle at 50% 50%, rgba(56,109,255,.18), rgba(56,109,255,0) 60%);
      filter:blur(10px);
      pointer-events:none;
    }
    .hero::after{
      content:"";
      position:absolute;
      right:-120px; top:80px;
      width:540px; height:540px;
      border-radius:50%;
      background:conic-gradient(from 90deg, rgba(255,255,255,.9), rgba(111,167,255,.18), rgba(255,255,255,0) 70%);
      filter:blur(2px);
      opacity:.7;
    }
    .brand-chip{
      display:inline-flex;
      align-items:center;
      gap:12px;
      padding:12px 20px;
      border:1px solid var(--line-2);
      border-radius:999px;
      color:var(--primary-2);
      background:rgba(255,255,255,.7);
      font-weight:700;
      letter-spacing:.5px;
    }
    .brand-icon{
      width:36px; height:36px; border-radius:12px;
      background:linear-gradient(180deg,#4f8dff,#2f64f3);
      display:grid; place-items:center;
      color:#fff; font-size:18px;
      box-shadow:0 10px 18px rgba(47,100,243,.28);
    }
    h1{
      font-size:68px;
      line-height:1.12;
      letter-spacing:1px;
      margin:34px 0 18px;
      font-weight:800;
    }
    .divider{
      width:74px;height:5px;border-radius:999px;
      background:linear-gradient(90deg,var(--primary),#7ba9ff);
      margin:0 0 26px;
    }
    .sub{
      color:var(--muted);
      font-size:24px;
      letter-spacing:.5px;
    }
    .stage{
      position:absolute;
      left:55px; right:45px; bottom:38px;
      height:48%;
      display:flex;
      align-items:flex-end;
      justify-content:center;
    }
    .orbit{
      position:absolute;
      bottom:14px;
      width:82%;
      aspect-ratio: 16 / 7;
      border-radius:50%;
      border:1px solid rgba(122,167,255,.35);
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.55);
    }
    .orbit::before,.orbit::after{
      content:"";
      position:absolute; inset:12% 8%;
      border-radius:50%;
      border:1px solid rgba(255,255,255,.42);
    }
    .orbit::after{ inset:24% 18%; }
    .platform{
      position:relative;
      width:450px; height:220px;
    }
    .layer{
      position:absolute; left:50%; transform:translateX(-50%);
      width:100%; border-radius:34px;
      background:linear-gradient(180deg,rgba(255,255,255,.95),rgba(208,226,255,.92));
      border:1px solid rgba(216,230,255,.9);
      box-shadow:var(--shadow-soft);
    }
    .layer.l1{ bottom:0; height:95px; width:100%; }
    .layer.l2{ bottom:28px; height:82px; width:87%; }
    .layer.l3{
      bottom:58px; height:76px; width:72%;
      background:linear-gradient(180deg,#79a8ff,#2f64f3);
      border-color:rgba(111,160,255,.8);
      box-shadow:0 18px 34px rgba(47,100,243,.35);
    }
    .glass{
      position:absolute;
      border-radius:26px;
      border:1px solid rgba(255,255,255,.58);
      background:linear-gradient(180deg, rgba(255,255,255,.36), rgba(205,225,255,.20));
      backdrop-filter:blur(8px);
      box-shadow:0 18px 40px rgba(91,127,198,.16);
      overflow:hidden;
    }
    .glass.card-a{ width:190px;height:180px; left:48px; bottom:112px; transform:rotate(-12deg);}
    .glass.card-b{ width:220px;height:210px; left:165px; bottom:136px; transform:rotate(-3deg);}
    .glass.card-c{ width:220px;height:220px; left:292px; bottom:130px; transform:rotate(7deg);}
    .glass .line{
      height:10px;border-radius:999px;
      background:rgba(255,255,255,.55);
      margin:14px 20px 0;
    }
    .avatar{
      width:52px;height:52px;border-radius:16px;
      background:linear-gradient(180deg,#8bb3ff,#4a7dff);
      margin:28px 0 0 22px;
      position:relative;
    }
    .avatar::before{
      content:"";
      position:absolute; left:16px; top:9px;
      width:20px; height:20px; border-radius:50%; background:#fff;
      box-shadow:0 22px 0 4px #fff;
    }
    .chart{
      position:absolute; left:24px; right:24px; bottom:30px; height:74px;
    }
    .bars{
      position:absolute; left:0; bottom:0; display:flex; gap:10px; align-items:flex-end;
    }
    .bars span{
      width:16px; border-radius:8px 8px 4px 4px;
      background:linear-gradient(180deg,#86b1ff,#3d7cff);
      display:block;
    }
    .bars span:nth-child(1){height:28px}
    .bars span:nth-child(2){height:44px}
    .bars span:nth-child(3){height:58px}
    .bars span:nth-child(4){height:36px}
    .linechart{
      position:absolute; inset:0 0 0 60px;
    }
    .linechart svg{ width:100%; height:100%; }
    .donut{
      position:absolute; width:74px;height:74px; right:20px; bottom:6px;
      border-radius:50%;
      background:conic-gradient(#3d7cff 0 35%, #8ec8ff 35% 72%, rgba(255,255,255,.8) 72% 100%);
    }
    .donut::after{
      content:"";
      position:absolute; inset:18px; border-radius:50%; background:rgba(255,255,255,.88);
    }

    .login{
      display:flex; align-items:center; justify-content:center;
      background:linear-gradient(180deg, rgba(255,255,255,.92), rgba(247,250,255,.94));
      padding:48px;
    }
    .login-card{
      width:min(550px, 100%);
      padding:44px 44px 40px;
      border-radius:28px;
      background:rgba(255,255,255,.82);
    }
    .login-badge{
      width:58px;height:58px;border-radius:18px;
      display:grid;place-items:center;
      color:var(--primary-2);
      background:linear-gradient(180deg,#edf4ff,#dce9ff);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.8);
      margin-bottom:18px;
      font-size:24px;
    }
    .login-label{
      color:var(--primary-2); font-weight:700; font-size:18px; margin-bottom:22px;
    }
    .login h2{
      margin:0; font-size:60px; line-height:1.08; font-weight:800;
    }
    .hint{
      color:var(--muted); font-size:18px; margin:22px 0 36px;
    }
    .field{ margin-bottom:24px; }
    .field label{
      display:block; color:var(--muted); font-size:18px; margin-bottom:12px; font-weight:600;
    }
    .input{
      height:68px; border-radius:18px; border:1px solid var(--line-2);
      display:flex; align-items:center; gap:14px; padding:0 18px;
      color:#506587; font-size:18px; background:#fff;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.85);
    }
    .input .icon,.input .eye{
      color:#8ea2c4; font-size:20px; flex:0 0 auto;
    }
    .input .value{ flex:1 1 auto; }
    .btn{
      height:70px; border:none; width:100%; border-radius:20px;
      background:linear-gradient(90deg,#4a85ff,#3066f3);
      color:#fff; font-size:28px; font-weight:800; letter-spacing:1px;
      box-shadow:0 16px 34px rgba(48,102,243,.30);
      cursor:pointer;
      margin-top:10px;
    }
    @media (max-width: 1200px){
      .page{grid-template-columns:1fr; min-height:auto}
      .hero{min-height:700px}
      .login-card{max-width:680px}
    }
    @media (max-width: 760px){
      .page{width:min(100vw - 24px, 100%); margin:12px auto; gap:12px}
      .hero,.login{padding:24px}
      h1{font-size:40px}
      .sub{font-size:18px}
      .hero{min-height:560px}
      .stage{left:18px; right:18px}
      .platform{transform:scale(.78)}
      .login-card{padding:28px}
      .login h2{font-size:40px}
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <div class="brand-chip">
        <span class="brand-icon">⬢</span>
        <span>华彩系统</span>
      </div>
      <h1>华彩经营管理平台</h1>
      <div class="divider"></div>
      <div class="sub">客户、借贷、财务与系统管理统一入口</div>

      <div class="stage">
        <div class="orbit"></div>
        <div class="platform">
          <div class="layer l1"></div>
          <div class="layer l2"></div>
          <div class="layer l3"></div>

          <div class="glass card-a">
            <div class="avatar"></div>
            <div class="line" style="width:90px"></div>
            <div class="line" style="width:110px"></div>
            <div class="line" style="width:72px"></div>
          </div>

          <div class="glass card-b">
            <div class="line" style="width:70px"></div>
            <div class="line" style="width:110px"></div>
            <div class="line" style="width:80px"></div>
            <div class="chart">
              <div class="bars">
                <span></span><span></span><span></span><span></span>
              </div>
              <div class="linechart">
                <svg viewBox="0 0 200 80" fill="none">
                  <path d="M4 56 L42 36 L74 50 L108 28 L140 44 L196 14" stroke="#3D7CFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
                  <circle cx="42" cy="36" r="4" fill="#3D7CFF"/>
                  <circle cx="74" cy="50" r="4" fill="#3D7CFF"/>
                  <circle cx="108" cy="28" r="4" fill="#3D7CFF"/>
                  <circle cx="140" cy="44" r="4" fill="#3D7CFF"/>
                  <circle cx="196" cy="14" r="4" fill="#3D7CFF"/>
                </svg>
              </div>
            </div>
          </div>

          <div class="glass card-c">
            <div class="line" style="width:92px"></div>
            <div class="line" style="width:122px"></div>
            <div class="donut"></div>
          </div>
        </div>
      </div>
    </section>

    <section class="login">
      <div class="login-card">
        <div class="login-badge">🔒</div>
        <div class="login-label">登录系统</div>
        <h2>账号登录</h2>
        <div class="hint">请输入您的账号和密码登录系统。</div>

        <div class="field">
          <label>账号</label>
          <div class="input">
            <span class="icon">👤</span>
            <span class="value">admin</span>
          </div>
        </div>

        <div class="field">
          <label>密码</label>
          <div class="input">
            <span class="icon">🔐</span>
            <span class="value">huacai123</span>
            <span class="eye">👁</span>
          </div>
        </div>

        <button class="btn">登录</button>
      </div>
    </section>
  </div>
</body>
</html>
